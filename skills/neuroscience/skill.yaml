name: NeuroscienceSkill
description: "Papers in neuroscience, including computational neuroscience, neuroimaging, brain stimulation, and neural circuit modelling."
extra_system_prompt: |
  Extract the key contributions, experimental methodology, brain regions involved,
  stimulation or recording techniques (e.g. TMS, tDCS, EEG, fMRI, patch clamp),
  behavioural measures, computational models, and limitations of this paper.
  Pay special attention to causal claims about neural circuits, plasticity mechanisms,
  and links between neural activity and cognition or behaviour.
