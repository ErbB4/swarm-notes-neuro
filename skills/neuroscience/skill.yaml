  - neuroscience
  - animal behavior and cognition
domain_expert_context: |
  Focus on explicit open questions about neural mechanisms, unresolved debates in
  circuit function, gaps in understanding plasticity rules, limitations of current
  stimulation protocols, or outstanding questions about brain-behaviour relationships.
  Reject generic future work such as "larger sample sizes" or "additional brain regions"
  unless the authors identify a specific mechanistic bottleneck.
critic_context: |
  Approve concepts only when they represent a reusable neural mechanism, computational
  principle, experimental paradigm, or theoretical framework likely to recur across
  neuroscience papers (e.g. spike-timing-dependent plasticity, predictive coding,
  neural manifold, inhibitory control, statistical learning).
  Reject anatomy labels, drug names, or dataset names unless paired with a reusable conceptual idea.
  Approve open questions only when they expose an unresolved mechanistic or causal question
  about neural circuits, plasticity, or brain-behaviour relationships.
