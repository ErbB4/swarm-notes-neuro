# Example swarm-notes configuration
llm_model: "google-gla:gemini-flash-lite-latest"
paper_source: "biorxiv"  # "arxiv", "semantic_scholar", "openalex", "biorxiv", or "medrxiv"
paper_keywords:
  - "structural plasticity"
  - "tdcs"
  - "tms"
paper_max_results_per_keyword: 5
paper_total_cap: 20
federation_feeds: []
public_feed_max_items: 20
max_history_days: 3  # hard cutoff: do not keep results older than this many days

# Site identity — shown in the website hero to identify this deployment
site_name: "Swarm Notes"
site_description: "Automated research paper tracking and knowledge synthesis."
# Optional: where the UI site config JSON is written
# site_config_file: "swarm-notes-ui/src/content/site-config.json"

# Skill configuration
active_skills:
  - "neuroscience"
# skills_dir: "skills"                       # Root directory for skills

# Experimental domain expert agent (crawls HTML, consumes token quotas)
# NOTE: biorxiv PDFs are Cloudflare-protected (since May 2025). Full-text
# analysis requires AWS credentials in your .env file so that paperscraper
# can retrieve PDFs via the biorxiv TDM/S3 API:
#   AWS_ACCESS_KEY_ID=...
#   AWS_SECRET_ACCESS_KEY=...
# Create an IAM key with AmazonS3ReadOnlyAccess. Without it the domain-expert
# step will silently skip full-text analysis for biorxiv papers.
enable_domain_expert: true
